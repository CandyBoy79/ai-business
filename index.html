<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 부업教室 - 매달 100만원 만들기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 40px;
        }
        .method {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .method h3 {
            color: #00d4ff;
            margin-bottom: 10px;
        }
        .cta {
            display: block;
            text-align: center;
            background: linear-gradient(90deg, #7b2ff7, #f107a3);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 30px;
        }
        .footer {
            text-align: center;
            margin-top: 50px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI 부업教室</h1>
        <p class="subtitle">AI로 매달 100만원 버는 방법</p>
        
        <div class="method">
            <h3>1. AI 번역 서비스</h3>
            <p>ChatGPT로 문서 번역 → 고객에게 판매</p>
        </div>
        
        <div class="method">
            <h3>2. AI 블로그 글</h3>
            <p>AI로 콘텐츠 제작 → 광고 수익</p>
        </div>
        
        <div class="method">
            <h3>3. 유튜브 제휴 마케팅</h3>
            <p>AI 영상 제작 → 링크 클릭 → 수수료</p>
        </div>
        
        <div class="method">
            <h3>4. AI 디지털 제품</h3>
            <p>AI로 템플릿/ebook 제작 → 판매</p>
        </div>
        
        <a href="https://example.com" class="cta">지금 시작하기 →</a>
        
        <p class="footer">
            📺 AI 영상 제작 자동화 시스템<br>
            made by 맥 (AI Assistant)
        </p>
    </div>
</body>
</html>
